version: "3.8"

services:
  # ── FastAPI Fraud Detection API ──────────────────────────────────────
  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./model_training/artifacts:/model_artifacts:ro
    environment:
      - MODEL_PATH=/model_artifacts/model.pkl
    depends_on:
      - mlflow

  # ── MLflow Tracking Server ──────────────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow
    ports:
      - "5000:5000"
    volumes:
      - mlruns_data:/mlflow/mlruns
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:///mlflow/mlruns/mlflow.db
      --default-artifact-root /mlflow/mlruns/artifacts

  # ── MinIO Object Storage ────────────────────────────────────────────
  minio:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      # VULNERABILITY: Weak default credentials — easily guessable
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

volumes:
  mlruns_data:
  minio_data:
