services:
  # ── MinIO Object Storage ────────────────────────────────────────────
  # S3-compatible storage backend for MLflow artifacts (model files)
  minio:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      # Credentials must be set via .env or secrets.env — no fallback defaults
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── MinIO Bucket Initialization ─────────────────────────────────────
  # One-shot service that creates the 'mlflow' bucket on first startup
  createbucket:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
      mc mb --ignore-existing myminio/mlflow;
      echo 'Bucket mlflow created (or already exists)';
      exit 0;
      "

  # ── MLflow Tracking Server ──────────────────────────────────────────
  # Tracks experiments, metrics, and model registry
  # Artifacts are stored in MinIO (S3-compatible) via s3://mlflow/
  mlflow:
    image: ghcr.io/mlflow/mlflow
    ports:
      - "5000:5000"
    volumes:
      - mlruns_data:/mlflow/mlruns
    environment:
      - MLFLOW_S3_ENDPOINT_URL=http://minio:9000
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD}
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:///mlflow/mlruns/mlflow.db
      --default-artifact-root s3://mlflow/
      --allowed-hosts "*"
    depends_on:
      createbucket:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Model Trainer (one-shot) ─────────────────────────────────────────
  # Trains the model and logs it to MLflow/MinIO, then exits.
  # Must complete successfully before the API app starts.
  trainer:
    build:
      context: ./Model_Training
      dockerfile: Dockerfile
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - MLFLOW_S3_ENDPOINT_URL=http://minio:9000
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD}
    depends_on:
      mlflow:
        condition: service_healthy


volumes:
  mlruns_data:
  minio_data:
