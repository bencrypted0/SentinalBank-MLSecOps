apiVersion: v1
kind: PersistentVolumeClaim   # requests a chunk of disk storage from the cluster
metadata:
  name: minio-pvc
spec:
  accessModes: ["ReadWriteOnce"]   # one pod can mount it read/write at a time
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
spec:
  replicas: 1
  selector:
    matchLabels: {app: minio}
  template:
    metadata:
      labels: {app: minio}
    spec:
      containers:
      - name: minio
        image: minio/minio
        args: ["server", "/data", "--console-address", ":9001"]
        ports:
        - containerPort: 9000
        - containerPort: 9001
        envFrom:
        - secretRef: {name: minio-creds}   # pulls MINIO_ROOT_USER/PASSWORD from a Secret
        volumeMounts:
        - name: data
          mountPath: /data
      volumes:
      - name: data
        persistentVolumeClaim: {claimName: minio-pvc}
---
apiVersion: v1
kind: Service
metadata:
  name: minio   # other pods reach MinIO at this DNS name
spec:
  selector: {app: minio}
  ports:
  - {name: api, port: 9000, targetPort: 9000}
  - {name: console, port: 9001, targetPort: 9001}