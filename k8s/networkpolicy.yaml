# NetworkPolicy — pod-to-pod firewall rules

# Default: deny ALL ingress in the namespace.
# Then each policy below opens only the specific ports that each component actually needs.

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
spec:
  podSelector: {}          # {} for every pod
  policyTypes: [Ingress]   # blocks all incoming traffic by default
  # No ingress rules, everything is denied

---

# Exceptions

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-app-ingress
spec:
  podSelector:
    matchLabels: {app: fraud-api}
  policyTypes: [Ingress]
  ingress:
  - ports:
    - {protocol: TCP, port: 8000}